name: Multiple Jobs

on:
  push:

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.0
      - name: Install and Run Cowsay
        run: |
              chmod +x ./scripts/cowsay.sh
              ./scripts/cowsay.sh
      - name: Upload dragon.txt as artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dragon-artifact
          path: dragon.txt
  test_job:
    runs-on: ubuntu-latest
    needs: build_job
    steps:
      - name: Download dragon.txt artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: dragon-artifact
      - name: Test file exists
        run: grep -i "run" dragon.txt
  deploy_job:
    runs-on: ubuntu-latest
    needs: test_job
    steps:
      - name: Download dragon.txt artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: dragon-artifact
      - name: Read file
        run: cat dragon.txt
      - name: Deploy
        run: echo "Deploying the application..."